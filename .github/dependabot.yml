# Managed by configure-repos.sh
version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      composer-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Don't open routine major-version PRs. Security updates still bump majors.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Don't open routine major-version PRs. Security updates still bump majors.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Don't open routine major-version PRs. Security updates still bump majors.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"